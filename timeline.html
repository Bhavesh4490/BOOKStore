<style>
 /* --- 1. VARIABLES & RESET --- */
    :root {
      --bg-dark: #050505;
      --bg-card: #121212;
      --bg-glass: rgba(18, 18, 18, 0.75);
      --border-color: rgba(255, 255, 255, 0.1);
      
      --primary-gradient: linear-gradient(135deg, var(--accent-color), #8b5cf6);
      --accent-color: var(--accent-color);
      --text-main: #ffffff;
      --text-muted: #a1a1aa;
      
      --shadow-soft: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 20px rgba(59, 130, 246, 0.15);
      
      --radius-lg: 20px;
      --radius-md: 12px;
      --radius-pill: 50px;
      
      --font-body: 'Inter', sans-serif;
      --font-head: 'Poppins', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* --- 2. HEADER & NAVIGATION --- */
    header {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(5, 5, 5, 0.8);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-color);
  padding: 15px 20px;
  display: flex;
  justify-content: center;
  align-items: center;
}

header::before{
  content:"";
  position:absolute;
  inset:-15px -30px;
  border-radius:15px;
  border:2px solid var(--accent-color);
  box-shadow:0 0 25px var(--accent-color);
  z-index:-1;
  animation:borderGlow 3s ease-in-out infinite alternate;
}

@keyframes borderGlow{
  from{
    box-shadow:0 0 15px var(--accent);
  }
  to{
    box-shadow:0 0 35px var(--accent);
  }
}
 #logo {
      height: 45px;
      object-fit: contain;
    }

    /* Hamburger */
    .hamburger {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      z-index: 1100;
    }

    .hamburger span {
      display: block;
      height: 2px;
      width: 100%;
      background: var(--text-main);
      border-radius: 2px;
      transition: all 0.3s ease-in-out;
    }

    /* Hamburger Active State */
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 6px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -6px); }

    /* Slide Menu */
    .menu {
      position: fixed;
      top: 0;
      right: -300px;
      width: 280px;
      height: 100vh;
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(20px);
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding-top: 80px;
      transition: right 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
      z-index: 1000;
      box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }

    .menu.active { right: 0; }

    .menu a {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 16px 25px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 16px;
      font-weight: 500;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
    }

    .menu a:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.03);
    }

    .menu a.active {
      color: var(--accent-color);
      background: rgba(59, 130, 246, 0.05);
      border-left-color: var(--accent-color);
    }

    .menu-icon, .menu-logo { width: 20px; height: 20px; object-fit: contain; opacity: 0.8; }
    .menu a:hover .menu-icon { opacity: 1; }

.controls{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:30px 0 15px 0;   /* reduced bottom space */
  flex-wrap:wrap;
}


button, select{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
}
select{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
  
  padding:12px 45px 12px 18px;
  border-radius:var(--radius-pill);
  font-weight:600;
  font-size:14px;
  letter-spacing:0.5px;
  
  background:var(--bg-glass);
  backdrop-filter:blur(15px);
  -webkit-backdrop-filter:blur(15px);
  
  border:1px solid var(--border-color);
  color:var(--text-main);
  
  box-shadow:var(--shadow-soft);
  transition:all 0.3s ease;
  cursor:pointer;
  position:relative;
}

/* Hover effect */
select:hover{
  border-color:var(--accent-color);
  box-shadow:0 0 15px var(--accent-color);
  transform:translateY(-2px);
}

/* Focus effect */
select:focus{
  outline:none;
  border-color:var(--accent-color);
  box-shadow:0 0 20px var(--accent-color);
}.controls{
  position:relative;
}

/* Arrow icon */
.controls::after{
  content:"⌄";
  position:absolute;
  right:calc(50% - 130px);
  top:50%;
  transform:translateY(-50%);
  pointer-events:none;
  font-size:16px;
  color:var(--text-muted);
  transition:0.3s;
}

/* Glow arrow on hover */
.controls:hover::after{
  color:var(--accent-color);
}
.timeline-container{
  position:relative;
  width:92%;                 /* wider */
  margin:30px auto 25px auto;
  padding:70px 50px;         /* increased height + side space */
  border-radius:var(--radius-lg);
  background:var(--bg-glass);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-color);
  box-shadow:var(--shadow-soft), var(--shadow-glow);
  overflow:visible;          /* IMPORTANT → allows scale years to show */
}

.timeline-container::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  padding:1px;
  background:var(--primary-gradient);
  -webkit-mask: 
     linear-gradient(#000 0 0) content-box, 
     linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity:0.4;
  pointer-events:none;
}

.timeline-line{
  height:8px;
  border-radius:50px;
  position:relative;
  background:linear-gradient(
    90deg,
    var(--accent-color),
    #8b5cf6,
    var(--accent-color)
  );
  background-size:200% 100%;
  animation:flowLine 6s linear infinite;
  box-shadow:0 0 15px var(--accent-color);
}

@keyframes flowLine{
  from{ background-position:0% 50%; }
  to{ background-position:200% 50%; }
}

.dot{
  width:24px;
  height:24px;
  border-radius:50%;
  position:absolute;
  top:-8px;
  cursor:pointer;
  background:var(--primary-gradient);
  box-shadow:
    0 0 0 4px var(--accent-color),
    0 0 20px var(--accent-color);
  transition:left 0.25s ease, transform 0.3s ease;
  animation:pulseDot 2s infinite ease-in-out;
}
.dot{
  transition:
    left 0.35s cubic-bezier(.22,1,.36,1),
    transform 0.3s ease;
}
.dot:hover{
  transform:scale(1.25);
}

@keyframes pulseDot{
  0%,100%{
    box-shadow:
      0 0 0 4px var(--accent-color),
      0 0 15px var(--accent-color);
  }
  50%{
    box-shadow:
      0 0 0 8px var(--accent-color),
      0 0 30px var(--accent-color);
  }
}
.event-card{
  background:var(--bg-glass);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid var(--border-color);
  padding:30px;
  border-radius:var(--radius-lg);
  width:360px;
  margin:25px auto;
  box-shadow:var(--shadow-soft);
  opacity:0;
  transform:translateY(25px) scale(0.98);
  transition:0.5s ease;
  position:relative;
}
.event-card.active{
  opacity:1;
  transform:translateY(0) scale(1);
}


.event-card img{
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

.year{
  font-size:22px;
  color:var(--accent-color);
  font-weight:bold;
}

ul{
  margin-top:8px;
  padding-left:18px;
}
.badge{
  position:absolute;
  top:-12px;
  left:-12px;
  background:linear-gradient(135deg,#ffcc00,#ff6600);
  color:#000;
  font-size:12px;
  font-weight:bold;
  padding:6px 12px;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.4);
  animation:popIn 0.4s ease forwards;
  letter-spacing:1px;
}

@keyframes popIn{
  from{
    transform:scale(0.6);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}
.scale{
  position:absolute;
  width:100%;
  top:8px;
  left:0;
  display:flex;
  justify-content:space-between;
  pointer-events:none;
}

.scale-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:0.3s;
}

.scale-line{
  width:3px;
  height:14px;
  border-radius:2px;
  background:var(--text-muted);
  margin-bottom:8px;
  transition:0.3s ease;
}

.scale-year{
  font-size:11px;
  font-weight:500;
  color:var(--text-muted);
  white-space:nowrap;      /* prevent wrapping */
  max-width:70px;          /* limit width */
  overflow:hidden;
  text-overflow:ellipsis;  /* show ... */
}

.scale-item.active .scale-line{
  height:24px;
  background:var(--accent-color);
  box-shadow:0 0 10px var(--accent-color);
}

.scale-item.active .scale-year{
  font-size:13px;
  font-weight:600;
  color:var(--accent-color);
}

    /* --- 10. SOCIAL & FOOTER --- */
    .social-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border-radius: var(--radius-pill);
      background: #1f1f22;
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: 0.3s;

    .social-btn:hover {
      background: #27272a;
      border-color: rgba(255,255,255,0.1);

    .social-btn.insta:hover { color: #e1306c; border-color: #e1306c; }

.social-logo {
  width: 22px;
  height: 22px;
  object-fit: contain;
}
.social-btn.youtube:hover {
  color: #ff0000;
  border-color: #ff0000;
  box-shadow: 0 0 14px rgba(255, 0, 0, 0.35);
}

.menu i {
  font-size: 20px;
  opacity: 0.85;
}

.menu a:hover i {
  opacity: 1;
}
.social-btn {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border-color);
  backdrop-filter: blur(16px);
  transition: all 0.3s ease;
}
.social-btn:hover {
  background: var(--accent-color);
  border-color: var(--accent-color);
  box-shadow: 0 0 18px var(--accent-color);
}
    footer {
      border-top: 1px solid var(--border-color);
      padding: 40px 20px;
      text-align: center;
      background: #020202;
    }

    .madeby {
      font-weight: 600;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    footer a { color: var(--text-muted); text-decoration: none; margin: 0 10px; font-size: 0.9rem; }
    footer a:hover { color: white; }
.nav-buttons{
  display:flex;
  justify-content:center;
  gap:25px;
  margin:15px 0 10px 0;
}

.nav-btn{
  padding:10px 22px;
  border-radius:var(--radius-pill);
  border:1px solid var(--border-color);
  background:var(--bg-glass);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  color:var(--text-main);
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:var(--shadow-soft);
}

.nav-btn:hover{
  transform:translateY(-3px);
  border-color:var(--accent-color);
  box-shadow:0 0 18px var(--accent-color);
}

.nav-btn:active{
  transform:scale(0.95);
}

.nav-btn.disabled{
  opacity:0.4;
  pointer-events:none;
  box-shadow:none;
}
/* ===== Timeline Hero ===== */
.timeline-hero{
  text-align:center;
  padding:45px 20px 25px 20px;
  position:relative;
}

.timeline-title{
  font-family:var(--font-head);
  font-size:42px;
  font-weight:700;
  letter-spacing:1px;
  margin-bottom:12px;
}

.glow-text{
  background:linear-gradient(90deg,var(--accent-color),#8b5cf6,var(--accent-color));
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 6s linear infinite;
}

@keyframes shine{
  from{ background-position:0% center; }
  to{ background-position:200% center; }
}

.timeline-subtitle{
  color:var(--text-muted);
  font-size:15px;
  letter-spacing:1px;
  text-transform:uppercase;
}

/* Subtle glow underline */
.timeline-hero::after{
  content:"";
  display:block;
  width:140px;
  height:3px;
  margin:18px auto 0 auto;
  border-radius:50px;
  background:var(--primary-gradient);
  box-shadow:0 0 15px var(--accent-color);
}
@media (max-width: 768px){

  .timeline-container{
    overflow-x:auto;
    padding:60px 30px;
  }

  .timeline-line{
    min-width:800px;   /* important */
  }

}
.timeline-container{
  scroll-behavior:smooth;
}

.timeline-line{
  scroll-snap-type:x mandatory;
}

.scale-item{
  scroll-snap-align:center;
}

<script>
  
    // Hamburger Menu
    const hamburger = document.getElementById("hamburger");
    const menu = document.getElementById("menu");

    hamburger.addEventListener("click", (e) => {
      e.stopPropagation();
      hamburger.classList.toggle("active");
      menu.classList.toggle("active");
    });

    document.addEventListener("click", (e) => {
      if (!menu.contains(e.target) && !hamburger.contains(e.target)) {
        menu.classList.remove("active");
        hamburger.classList.remove("active");
      }
    });
    const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");

function updateNavButtons(){
  const total = chapters[currentChapter].length;

  prevBtn.classList.toggle("disabled", currentIndex === 0);
  nextBtn.classList.toggle("disabled", currentIndex === total - 1);
}

prevBtn.addEventListener("click", ()=>{
  if(currentIndex > 0){
    moveDot(currentIndex - 1);
    updateNavButtons();
  }
});

nextBtn.addEventListener("click", ()=>{
  if(currentIndex < chapters[currentChapter].length - 1){
    moveDot(currentIndex + 1);
    updateNavButtons();
  }
});

let currentChapter="ch1";
let currentIndex=0;

const dot=document.getElementById("dot");
const eventCard=document.getElementById("eventCard");
const timelineLine=document.getElementById("timelineLine");

function renderEvent(){
  const event=chapters[currentChapter][currentIndex];
  eventCard.innerHTML=`
  ${event.badge ? `<div class="badge">${event.badge}</div>` : ""}
  <div class="year">${event.year}</div>
  <h3>${event.title}</h3>
  <ul>
    <li>${event.reasons[0] || ""}</li>
    <li>${event.reasons[1] || ""}</li>
  </ul>
`;
  eventCard.classList.add("active");
}

function moveDot(index){

  currentIndex = index;

  // Update scale first
  renderScale();

  // Get all scale items
  const scaleItems = document.querySelectorAll(".scale-item");
  const activeItem = scaleItems[index];

  const lineRect = timelineLine.getBoundingClientRect();
  const itemRect = activeItem.getBoundingClientRect();

  // Calculate center of scale tick relative to timeline
  const center = (itemRect.left - lineRect.left) + (itemRect.width / 2);

  // Position dot centered on tick
  dot.style.left = (center - dot.offsetWidth/2) + "px";

  // Animate card
  eventCard.classList.remove("active");
  setTimeout(renderEvent,200);
  updateNavButtons();
}

dot.addEventListener("click",()=>{
  currentIndex++;
  if(currentIndex>=chapters[currentChapter].length) currentIndex=0;
  moveDot(currentIndex);
});

let isDragging=false;

function getNearestIndexFromPosition(x){
  const rect = timelineLine.getBoundingClientRect();
  const total = chapters[currentChapter].length - 1;

  const percent = Math.min(Math.max(x / rect.width, 0), 1);
  return Math.round(percent * total);
}

// CLICK ANYWHERE → SNAP
timelineLine.addEventListener("click",(e)=>{
  const rect = timelineLine.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const index = getNearestIndexFromPosition(x);
  moveDot(index);
});

// START DRAG
dot.addEventListener("mousedown",(e)=>{
  isDragging=true;
  e.stopPropagation();
});

// DRAG MOVE (Smooth Follow)
document.addEventListener("mousemove",(e)=>{
  if(!isDragging) return;

  const rect = timelineLine.getBoundingClientRect();
  let x = e.clientX - rect.left;

  if(x<0) x=0;
  if(x>rect.width) x=rect.width;

  dot.style.left = x - dot.offsetWidth/2 + "px";
});

// STOP DRAG → SNAP TO NEAREST
document.addEventListener("mouseup",(e)=>{
  if(!isDragging) return;
  isDragging=false;

  const rect = timelineLine.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const index = getNearestIndexFromPosition(x);
  moveDot(index);
});

// DRAG MOVE
document.addEventListener("mousemove",(e)=>{
  if(!isDragging) return;

  const rect=timelineLine.getBoundingClientRect();
  let x=e.clientX-rect.left;

  if(x<0)x=0;
  if(x>rect.width)x=rect.width;

  dot.style.left=x+"px"; // smooth follow (no snapping yet)
});
function renderScale(){
  const scale=document.getElementById("scale");
  scale.innerHTML="";
  const events=chapters[currentChapter];

  events.forEach((event,index)=>{
    const item=document.createElement("div");
    item.className="scale-item";
    if(index===currentIndex) item.classList.add("active");

    item.innerHTML=`
      <div class="scale-line"></div>
      <div class="scale-year">
  ${window.innerWidth < 768 ? event.year.split(" ")[0] : event.year}
</div>
    `;

    scale.appendChild(item);
  });
}
document.getElementById("chapterSelect").addEventListener("change",(e)=>{
  currentChapter=e.target.value;
  currentIndex=0;
  moveDot(0);
});

moveDot(0);
renderScale();
